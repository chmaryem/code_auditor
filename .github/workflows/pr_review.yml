# ──────────────────────────────────────────────────────────────────────────────
# Code Auditor — PR Review (workflow local pour le repo code_auditor lui-même)
#
# Ce workflow analyse les PRs du repo code_auditor.
# Pour les repos externes, utiliser : python main.py ci-deploy --repo owner/repo
# ──────────────────────────────────────────────────────────────────────────────

name: "Code Auditor — Self Review"

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  statuses: write
  pull-requests: write
  contents: read

jobs:
  code-review:
    name: "🔍 Self Review"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Cache pip"
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: "📦 Install dependencies"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: "🔍 Analyse PR"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python -m ci_cd.ci_runner \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}"
